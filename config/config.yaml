pipeline:
  max_retries: 3

solver:
  max_steps: 10
  simplify_result: true

ir:
  netlist:
    require_ground: true
    require_source: true
    # Public examples include netlists so tests are reproducible.
    # Set false to force visual netlist extraction from the image.
    use_provided_netlist: false

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

data:
  base_path: "data"
  output_path: "output"
